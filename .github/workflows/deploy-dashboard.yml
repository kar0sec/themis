name: Deploy Dashboard

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'                              # <-- Neu

      - name: Install
        run: pip install streamlit pandas altair

      - name: Syntax check
        run: python -m py_compile dashboard/app.py

      - name: Deploy (placeholder)
        run: echo "🚀 Deploy dashboard/app.py → Streamlit Cloud / Docker"
