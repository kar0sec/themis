name: Build PDF

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/policies/*.md'
  workflow_dispatch:

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-extra

      - name: Build PDF per policy
        run: |
          mkdir -p docs/pdf
          ERROR=0
          for f in docs/policies/*.md; do
            [ -f "$f" ] || continue
            out="docs/pdf/$(basename "$f" .md).pdf"
            if pandoc "$f" -o "$out" --pdf-engine=pdflatex; then
              echo "✅ $out created"
            else
              echo "⚠️  Fehler bei $f – übersprungen"
              ERROR=1
            fi
          done
          [ "$ERROR" -eq 0 ] || echo "⚠️  Mindestens eine PDF konnte nicht erstellt werden"

      - uses: actions/upload-artifact@v4
        with:
          name: policies-pdf
          path: docs/pdf/
